name: nikon_field_monitor
description: "NikonFieldMonitor - Professional wireless/USB live view monitor & remote controller for Nikon Z-series and PTP/IP cameras."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  shared_preferences: ^2.2.3
  cupertino_icons: ^1.0.8
  permission_handler: ^11.3.1
  network_info_plus: ^5.0.3
  wakelock_plus: ^1.2.8
  path_provider: ^2.1.4
  file_picker: ^8.0.7
  collection: ^1.18.0
  uuid: ^4.4.0
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/shaders/
    - assets/luts/
    - android/app/src/main/assets/shaders/
    - android/app/src/main/assets/luts/
